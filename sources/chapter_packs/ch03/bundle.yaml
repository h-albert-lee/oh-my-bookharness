  type: academic_paper
  url: https://arxiv.org/abs/2509.14404
  quality_score: 4
  relevance: '프롬프트 결함을 6개 차원의 구조적 원인으로 분류한 최초의 체계적 논문. "프롬프트를 개선하면 된다"는 귀인 오류를 소프트웨어
    엔지니어링 관점에서 반박한다. 4-1절에서 "프롬프트 개선으로도 해결되지 않는 이유"를 설명할 때 보강 근거로 활용.

