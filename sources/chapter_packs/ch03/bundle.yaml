  type: industry_report
  url: https://www.mckinsey.com/capabilities/quantumblack/our-insights/the-state-of-ai-2024
  quality_score: 4
  relevance: 'McKinsey 1,363명 글로벌 설문 기반 보고서. 72% 조직이 AI를 사용하지만 기업 수준의 실질적 가치 창출은 극소수라는
    "채택-가치 격차"를 데이터로 제시. 4-1절 도입부에서 독자 공감을 유도하는 현황 수치로 활용 가능하며, 고성과 기업이 데이터·운영 모델
