  url: https://arxiv.org/abs/2005.11401
  quality_score: 5
  relevance: 'RAG 개념을 최초로 정식화한 원논문. ch05에서 ''RAG가 왜 등장했는가''를 LLM의 구조적 한계(파라메트릭 메모리의
    지식 접근 제한, 갱신 불가)에서 도출하는 핵심 논거로 활용한다. ''파라메트릭 메모리(모델 내부 지식) vs. 비파라메트릭 메모리(외부 검색
    인덱스)''의 이분법 프레임은 RAG를 아키텍처적 선택으로 설명하는 뼈대가 된다.

    '
