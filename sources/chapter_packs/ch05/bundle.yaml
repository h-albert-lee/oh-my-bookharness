    Relevance 세 차원을 제시. ch05에서 ''각 단계가 독립적 설계 결정 지점''임을 실증하는 평가 관점의 논거로 활용한다. 또한 RAG
    실패 진단이 단계별로 가능하다는 주장을 뒷받침하는 방법론적 근거가 된다.

