  - Meng Wang
  - Haofen Wang
  year: 2024
  type: academic_paper
  url: https://arxiv.org/abs/2312.10997
  quality_score: 5
  relevance: 'RAG 패러다임을 Naive RAG → Advanced RAG → Modular RAG 세 단계로 분류하는 가장 널리 인용되는
    서베이. 각 단계가 정보 흐름 통제의 어느 지점을 담당하는지 구조적으로 설명할 때 핵심 참고문헌으로 쓴다. Naive RAG의 실패(낮은 정밀도,
    낮은 재현율, 구식 정보)를 구체적으로 기술한 부분이 ch05 ''기능으로 보면 무슨 일이 일어나는가'' 절에 직결된다.

    '
- source_id: web_03
