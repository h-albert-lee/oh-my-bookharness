    ''RAG는 기능이 아니라 아키텍처''라는 ch05의 핵심 주장을 이론적으로 뒷받침하는 가장 직접적인 논문이다. 각 모듈이 정보 흐름 통제의
    독립적인 설계 결정 지점임을 설명하는 구조적 프레임워크를 제공한다.

    '
