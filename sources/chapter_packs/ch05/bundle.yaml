  url: https://arxiv.org/abs/2401.05856
  quality_score: 5
  relevance: '연구·교육·바이오메디컬 3개 도메인의 실제 RAG 케이스 스터디에서 도출한 7가지 실패 지점을 실증적으로 정리. ch05의
    ''RAG 실패의 아키텍처적 분류'' 절에 가장 직접적으로 활용할 수 있는 자료다. ''검증은 운영 중에만 가능하다''는 결론은 RAG를 지속적으로
    설계해야 하는 아키텍처로 봐야 한다는 주제 의식과 연결된다.

    '
