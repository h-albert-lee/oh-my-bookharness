  authors:
  - James Ryseff
  - Brandon F. De Bruhl
  - Sydne J. Newberry
  year: 2024
  url: https://www.rand.org/pubs/research_reports/RRA2680-1.html
  quality_score: 5
  relevance: '65명 인터뷰 기반의 RAND 보고서. "AI 프로젝트 80% 이상 실패, 비AI IT 대비 2배" 수치의 신뢰도 높은 출처.
    실패 원인이 모델이 아닌 구조적 요인(문제 정의 오류, 인프라 부재)임을 실증. 도입부 충격 통계 및 ''귀인 오류'' 섹션의 핵심 레퍼런스.

    '
