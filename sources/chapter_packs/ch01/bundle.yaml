  - Jie M. Zhang
  - Mark Harman
  - Meng Wang
  year: 2025
  url: https://arxiv.org/abs/2308.02828
  quality_score: 5
  relevance: '829개 문제로 ChatGPT 비결정성을 정량 측정한 최초의 체계적 실증 연구. 기본 설정에서 75.76%(CodeContests)
    비율로 동일 출력이 단 한 번도 나오지 않음. "같은 프롬프트, 다른 결과"가 측정 가능한 공학적 현실임을 독자에게 납득시키는 구체적 수치
    근거. 비결정성 개념 도입의 실증 앵커.

    '
