    "temperature를 0으로 하면 비결정성이 없어진다"는 오해를 해체하는 직접 근거. 비결정성 개념 섹션의 핵심 학술 인용.

    '
- source_id: web_04
  type: web
  title: An Empirical Study of the Non-Determinism of ChatGPT in Code Generation
  authors:
