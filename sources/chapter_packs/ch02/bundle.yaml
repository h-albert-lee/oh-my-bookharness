chapter_id: ch02
title: AI 시스템은 왜 기존 소프트웨어와 다른가
description: TDD→EDD 전환. 결정론 vs 확률론, 새 방법론 선언
core_sources:
- source_id: web_01
  title: 'Evaluation-Driven Development and Operations of LLM Agents: A Process Model
    and Reference Architecture'
  authors:
  - Boming Xia
  - Qinghua Lu
  - Liming Zhu
  - Zhenchang Xing
  - Dehai Zhao
  - Hao Zhang
  year: 2024
  type: academic_paper
  url: https://arxiv.org/abs/2411.13768
  quality_score: 5
  relevance: 'ch02의 핵심 이론 기둥. TDD/BDD가 LLM 에이전트에서 무력화되는 4가지 구조적 한계(정적 요구사항 의존, 이진
    pass/fail 단언, 배포 전 검증 집중, 창발 행동 미지원)를 명시화하고, 그 대안으로 EDD를 제안한다. ''TDD 무력화 → EDD
    선언'' 논증 구조와 정확히 대응하는 학술 근거. EDD·TDD 비교표 직접 인용 가능.

    '
- source_id: web_02
  title: 'Challenges in Testing Large Language Model Based Software: A Faceted Taxonomy'
  authors:
  - Felix Dobslaw
  - Robert Feldt
  - Juyeon Yoon
  - Shin Yoo
  year: 2025
  type: academic_paper
  url: https://arxiv.org/abs/2503.00481
  quality_score: 5
  relevance: 'LLM 기반 소프트웨어의 비결정론이 결정론적 오라클(assertEqual)에 의존하는 기존 테스트 패러다임을 어떻게 붕괴시키는지를
    분류 체계로 정리. ''정확성을 이진 속성이 아닌 결과의 분포''로 봐야 한다는 주장은 ''good enough 기준'' 논증에 직접 인용
    가능. temperature=0에서도 출력 불일치 발생 실증 포함.

    '
- source_id: web_03
  title: Non-Determinism of 'Deterministic' LLM Settings
  authors:
  - Bolaji Akinwande
  - Ana Marasović
  - et al.
  year: 2024
  type: academic_paper
  url: https://arxiv.org/abs/2408.04667
  quality_score: 5
  relevance: 'temperature=0 설정에서도 LLM이 비결정론적임을 코드 생성 데이터셋(CodeContests 75.76%, APPS
    51%, HumanEval 47.56% 불일치)으로 실증. ''결정론의 환상'' 논증의 가장 강력한 실증 근거. 단위 테스트가 비결정론 때문에
    제한적임을 명시적으로 언급하여 TDD 무력화 설명에 핵심 자료.

    '
- source_id: web_04
  title: Hidden Technical Debt in Machine Learning Systems
  authors:
  - D. Sculley
  - Gary Holt
  - Daniel Golovin
  - Eugene Davydov
  - Todd Phillips
  - Dietmar Ebner
  - Vinay Chaudhary
  - Michael Young
  - Jean-François Crespo
  - Dan Dennison
  year: 2015
  type: academic_paper
  url: https://proceedings.neurips.cc/paper_files/paper/2015/file/86df7dcfd896fcaf2674f757a2463eba-Paper.pdf
  quality_score: 5
  relevance: 'Google의 NeurIPS 기념비적 논문. ML 시스템이 전통 코드의 유지보수 문제에 더해 ML 고유 기술 부채를 추가로
    안고 있음을 논증. 재현성 부채(비결정론, 분산 학습)와 ''전통 단위 테스트·리팩터링이 ML 수준 기술 부채에 충분하지 않다''는 주장이
    TDD 무력화 메커니즘 논증의 권위 있는 기반.

    '
- source_id: web_05
  title: On Testing Machine Learning Programs
  authors:
  - Houssem Ben Braiek
  - Foutse Khomh
  year: 2020
  type: academic_paper
  url: https://www.sciencedirect.com/science/article/abs/pii/S0164121220300248
  quality_score: 5
  relevance: 'ML 프로그램 테스팅이 어려운 근본 이유를 ''연역적(규칙 명시) → 귀납적(데이터에서 규칙 추출)'' 패러다임 전환으로
    설명한 선구적 논문. TDD가 전제하는 ''사전 명세 가능한 로직''이 ML에서 성립하지 않는 이유를 학술적으로 논증. 후속 연구들이 광범위하게
    인용하는 기초 레퍼런스.

    '
- source_id: web_06
  title: 'Beyond Accuracy: Behavioral Testing of NLP Models with CheckList'
  authors:
  - Marco Tulio Ribeiro
  - Tongshuang Wu
  - Carlos Guestrin
  - Sameer Singh
  year: 2020
  type: academic_paper
  url: https://aclanthology.org/2020.acl-main.442/
  quality_score: 5
  relevance: 'ACL 2020 Best Paper. 단일 정확도(assertEqual 수준)로 모델을 평가하는 방식이 성능을 과대 추정함을
    실증. MFT·INV·DIR 같은 새 평가 유형 제안. ''assertEqual의 붕괴'' 절에서 구체적 사례로 인용 가능하며, EDD의 도구로서
    평가 유형 다양화 필요성을 뒷받침.

    '
- source_id: web_07
  title: Judging LLM-as-a-Judge with MT-Bench and Chatbot Arena
  authors:
  - Lianmin Zheng
  - Wei-Lin Chiang
  - Ying Sheng
  - et al.
  year: 2023
  type: academic_paper
  url: https://arxiv.org/abs/2306.05685
  quality_score: 5
  relevance: 'EDD의 핵심 수단인 LLM-as-a-Judge를 체계화한 NeurIPS 2023 논문. ''정답 일치''가 아닌 ''인간
    선호도 근사(80% 이상 일치)''라는 새로운 품질 기준 개념 도입. ch02에서 ''good enough 기준''의 실증적 정당성과 평가자(Evaluator)
    개념 도입의 근거로 직접 인용 가능.

    '
- source_id: web_08
  title: From Test- and Behavior-Driven to Evaluation-Driven Development
  authors:
  - Vivek Suresh
  year: 2025
  type: blog_post
  url: https://medium.com/ylogx/from-test-and-behavior-driven-to-evaluation-driven-development-68865002aea2
  quality_score: 4
  relevance: 'TDD(Kent Beck, 1990s) → BDD(Dan North, 2006) → EDD로의 방법론 계보를 명료하게 정리.
    AI 시스템이 TDD/BDD를 무력화하는 3가지 이유(확률적 출력, 정적 테스트 대 동적 행동, 다차원 품질)를 독자 친화적으로 설명. ch02의
    논증 흐름과 일치하는 구조로 서술 방향 참조에 유용.

    '
supporting_sources:
