    결정론을 보장하지 않는다''는 기술적 심층 근거. ''비결정론은 버그가 아닌 구조적 속성''이라는 ch02 핵심 명제를 하드웨어 수준에서 뒷받침.

    '
- source_id: web_14
  title: Why Traditional Testing Fails for AI Agents (and What Actually Works)
  authors:
  - Coralogix
  year: 2025
  type: blog_post
  url: https://coralogix.com/ai-blog/why-traditional-testing-fails-for-ai-agents-and-what-actually-works/
  quality_score: 4
  relevance: 'pass/fail 단언이 확률론적 시스템에서 무의미한 이유를 실제 사례($2.3M 계약 손실)와 함께 제시. ''테스트를
    모두 통과하고도 프로덕션에서 47가지 방식으로 다르게 행동하는'' 조용한 실패 시나리오는 TDD 무력화 메커니즘의 구체적 내러티브로 활용 가능.

    '
- source_id: web_15
  title: 'Beyond Traditional Testing: Addressing the Challenges of Non-Deterministic
