  - Shanqing Cai
  - Eric Nielsen
  - Michael Salib
  - D. Sculley
  year: 2017
  type: academic_paper
  url: https://research.google/pubs/the-ml-test-score-a-rubric-for-ml-production-readiness-and-technical-debt-reduction/
  quality_score: 5
  relevance: 'Google 연구진의 ML 프로덕션 준비도 루브릭 논문. ML 시스템의 예측 행동을 사전 명세하기 어렵다는 한계를 공식화.
    ''테스트 통과/실패만으로 프로덕션 준비도를 측정할 수 없다''는 주장이 테스트→평가 전환 논거를 보완.

    '
- source_id: web_10
  title: 'Machine Learning Testing: Survey, Landscapes and Horizons'
  authors:
  - Jie M. Zhang
  - Mark Harman
  - Lei Ma
  - Yang Liu
  year: 2022
  type: academic_paper
  url: https://arxiv.org/abs/1906.10742
  quality_score: 5
  relevance: 'IEEE Transactions on Software Engineering 게재 ML 테스팅 최대 규모 서베이(144편 분석).
    테스트 오라클 문제(예상 출력 정의 어려움)가 ML 테스팅의 근본 난제임을 체계화. ''AI 시스템에서 기존 소프트웨어 테스트가 구조적으로
    달라지는 이유''의 학술적 포괄 레퍼런스.

    '
- source_id: web_11
  title: 'Rethinking Testing for LLM Applications: Characteristics, Challenges, and
    a Lightweight Interaction Protocol'
  authors:
  - (arXiv 2508.20737 저자진)
  year: 2025
  type: academic_paper
  url: https://arxiv.org/abs/2508.20737
  quality_score: 4
  relevance: 'LLM 애플리케이션이 기존 소프트웨어와 근본적으로 다른 이유를 ''결정론적 계산→확률론적 생성'', ''논리적 실행→뇌 영감
    모델링'', ''정적 규칙→동적 학습 행동'' 세 패러다임 전환으로 명시화. ch02의 ''결정론적 전제 붕괴 지점'' 서술의 이론적 뼈대로
    활용 가능.

    '
- source_id: web_12
  title: Non-Determinism and the Lawlessness of Machine Learning Code
  authors:
  - A. Feder Cooper
  - Jonathan Frankle
  - Christopher De Sa
  year: 2022
  type: academic_paper
  url: https://arxiv.org/pdf/2206.11834
  quality_score: 4
  relevance: 'ML 코드의 비결정론이 공정성 지표의 광범위한 변동을 야기하고 ''최선의 모델'' 판단을 어렵게 만든다는 논거. 비결정론의
    개념 정의와 실제 폐해를 함께 다뤄 ''결정론 vs 확률론'' 대비 구조 설명에 보완적.

    '
- source_id: web_13
  title: Defeating Nondeterminism in LLM Inference
  authors:
